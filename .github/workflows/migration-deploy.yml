# koopGenHes — Manuel Migration Deploy
#
# Sprint followup-pipeline (2026-05-25):
# Manuel trigger (workflow_dispatch) — Actions tab'tan "Run workflow"
# tiklayarak production Supabase'e migration push edilir.
# Auto-trigger ETMEZ: master push'unda otomatik calismaz, cunku
# migration apply geri donus zor + insan-onayli adim.
#
# === GEREKLI SECRETS (kullanici manuel ekler) ===
#   Settings > Secrets and variables > Actions > New repository secret
#
#   SUPABASE_ACCESS_TOKEN  — supabase.com > Account > Access Tokens
#   SUPABASE_PROJECT_REF   — `melbamccnvzhowgeybbj` (zaten linked-project.json'da)
#   SUPABASE_DB_PASSWORD   — Supabase Project Settings > Database > Connection
#
# Secrets eklenmediyse workflow `secrets.X` bos kalir; `--linked` baglama
# adimi 'Invalid access token' ile fail eder. Bu beklenir; aktif etmek
# icin kullanici secrets ekler.

name: Deploy Migrations (Manuel)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Sadece dry-run (gerçekten push etme)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: migration-deploy-${{ github.ref }}
  cancel-in-progress: false  # Migration apply yarisirsa veri tutarsizliği — iptal etme

jobs:
  push:
    name: supabase db push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production  # GitHub Environment koruma — Settings > Environments > "production" + required reviewers eklenebilir

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets present
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Eksik secret. Gerekli: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD"
            echo "Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi
          echo "Secrets OK."

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Dry-run push (her zaman calistir, baseline kontrolu)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --dry-run

      - name: Real push (sadece dry_run=false ise)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --include-all -y

      - name: Summary
        if: always()
        run: |
          echo "### Migration Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** ${{ github.event.inputs.dry_run == 'true' && 'DRY RUN' || 'REAL APPLY' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Project ref:** \`${{ secrets.SUPABASE_PROJECT_REF }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Lokal alternatif: \`npx supabase db push\`" >> $GITHUB_STEP_SUMMARY
