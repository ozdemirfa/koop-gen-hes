name: E2E — Offline mode gating

# Sprint: post-offline-mode (2026-05-26).
#
# offline-mode-gating.spec.ts UI gating davranisini end-to-end dogrular:
#   - banner mesaj icerigi (kullanicinin talep ettigi tam metin)
#   - non-owner butonlari disabled
#   - owner mode'da banner info renginde, restricted tag yok
#
# Spec icindeki test'ler hasCreds=false ise test.skip ile yumusak gecer.
# Bu job iki secret'a baglidir:
#   - E2E_USER, E2E_PASSWORD
#   - VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (renderer bundle)
#   - SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY (server)
#
# Trigger: yalniz manuel (workflow_dispatch). Her PR'da kosulmaz cunku
# 90sn webserver + login flow yavas; daily smoke yerine release-gate olarak
# kullanmasi onerilir.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'client/e2e/offline-mode-gating.spec.ts'
      - 'client/src/components/common/OfflineProjectBanner.tsx'
      - 'client/src/contexts/ProjectContext.tsx'
      - 'client/src/hooks/usePermissions.ts'
      - 'server/src/middleware/requireProjectAccess.ts'

concurrency:
  group: e2e-offline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-gating:
    name: Playwright — offline-mode-gating.spec.ts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip if E2E creds not configured
        id: precheck
        env:
          E2E_USER: ${{ secrets.E2E_USER }}
        run: |
          if [ -z "$E2E_USER" ]; then
            echo "E2E_USER secret bos — job skip ediliyor (yumusak gecis)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.precheck.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root deps (concurrently)
        if: steps.precheck.outputs.skip == 'false'
        run: npm ci

      - name: Install server deps
        if: steps.precheck.outputs.skip == 'false'
        working-directory: server
        run: npm ci

      - name: Install client deps
        if: steps.precheck.outputs.skip == 'false'
        working-directory: client
        run: npm ci

      - name: Create root .env (gercek Supabase creds)
        if: steps.precheck.outputs.skip == 'false'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          {
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
            echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY"
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
            echo "NODE_ENV=development"
          } > .env

      - name: Install Playwright browsers (chromium only)
        if: steps.precheck.outputs.skip == 'false'
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run offline-mode-gating spec
        if: steps.precheck.outputs.skip == 'false'
        working-directory: client
        env:
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CI: 'true'
        run: npx playwright test offline-mode-gating.spec.ts

      - name: Upload Playwright artifacts on failure
        if: failure() && steps.precheck.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-offline-gating-report
          path: |
            client/playwright-report/
            client/test-results/
          retention-days: 7
