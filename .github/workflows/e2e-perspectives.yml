name: E2E — Rol perspektifleri (manager + user)

# Sprint: perspektif-aktivasyon (2026-05-30).
#
# client/e2e/perspectives/ altındaki manager + user (görüntüleyici-alias) rol
# gating testlerini end-to-end doğrular:
#   - manager: operasyonel + kullanıcı yönetimi aksiyonları enabled, owner-only
#     proje arşivle butonu görünmez
#   - user: "Görüntüleyici" tag render, Kullanıcı Yönetimi erişilemez (/forbidden),
#     oluşturma (canEdit) serbest
#
# Spec'ler hasManagerCreds / hasViewerCreds false ise test.skip ile yumuşak geçer.
# Bu job dedicated fixture secret'larına bağlıdır:
#   - E2E_MANAGER_USER, E2E_MANAGER_PASSWORD  (test projesine `manager` rolüyle bağlı kullanıcı)
#   - E2E_VIEWER_USER,  E2E_VIEWER_PASSWORD   (test projesine `user` rolüyle bağlı kullanıcı)
#   - VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (renderer bundle)
#   - SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY (server)
#
# Trigger: yalnız manuel (workflow_dispatch) + perspektif spec değişikliklerinde push.
# 90sn webserver + login flow yavaş; her PR'da koşulmaz.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'client/e2e/perspectives/**'
      - 'client/e2e/helpers.ts'
      - 'client/src/hooks/usePermissions.ts'
      - 'client/src/components/AdminLayout.tsx'
      - 'client/src/components/common/ProtectedRoute.tsx'

concurrency:
  group: e2e-perspectives-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perspectives:
    name: Playwright — perspectives/
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip if perspektif creds not configured
        id: precheck
        env:
          E2E_MANAGER_USER: ${{ secrets.E2E_MANAGER_USER }}
          E2E_VIEWER_USER: ${{ secrets.E2E_VIEWER_USER }}
        run: |
          if [ -z "$E2E_MANAGER_USER" ] && [ -z "$E2E_VIEWER_USER" ]; then
            echo "E2E_MANAGER_USER + E2E_VIEWER_USER secret bos — job skip ediliyor (yumusak gecis)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.precheck.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root deps (concurrently)
        if: steps.precheck.outputs.skip == 'false'
        run: npm ci

      - name: Install server deps
        if: steps.precheck.outputs.skip == 'false'
        working-directory: server
        run: npm ci

      - name: Install client deps
        if: steps.precheck.outputs.skip == 'false'
        working-directory: client
        run: npm ci

      - name: Create root .env (gercek Supabase creds)
        if: steps.precheck.outputs.skip == 'false'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          {
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
            echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY"
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
            echo "NODE_ENV=development"
          } > .env

      - name: Install Playwright browsers (chromium only)
        if: steps.precheck.outputs.skip == 'false'
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run perspectives specs
        if: steps.precheck.outputs.skip == 'false'
        working-directory: client
        env:
          E2E_MANAGER_USER: ${{ secrets.E2E_MANAGER_USER }}
          E2E_MANAGER_PASSWORD: ${{ secrets.E2E_MANAGER_PASSWORD }}
          E2E_VIEWER_USER: ${{ secrets.E2E_VIEWER_USER }}
          E2E_VIEWER_PASSWORD: ${{ secrets.E2E_VIEWER_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CI: 'true'
        run: npx playwright test e2e/perspectives/

      - name: Upload Playwright artifacts on failure
        if: failure() && steps.precheck.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-perspectives-report
          path: |
            client/playwright-report/
            client/test-results/
          retention-days: 7
