# koopGenHes — Continuous Integration
#
# Sprint ci-pipeline (2026-05-25):
# - server-test: vitest run (386 baseline) + migration timestamp guard
# - client-build: tsc -b && vite build (route lazy splitting + manualChunks)
#
# Triggers: master push + her PR. Iki job paralel calisir.
# Node 20 LTS. node_modules cache npm lockfile hash'iyle.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Ayni branch icin paralel run'lari iptal et — yarisma + boslukta CI dakikasi
# tuketimi onlenir.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-test:
    name: Server — build + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Build (tsc)
        working-directory: server
        run: npm run build

      - name: Test (vitest)
        working-directory: server
        run: npm test

  client-build:
    name: Client — tsc + vite build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      # client/vite.config.ts envDir: '../' (root .env okur). CI'da gercek
      # Supabase URL/Key yok; build-time bundle'a placeholder inject etmek
      # yeterli (runtime'da prod env'de farkli value gelecek). Bu env vars
      # ozellikle 'import.meta.env.VITE_*' usage'lari icin gerekli (lib/supabase.ts).
      - name: Create .env placeholder
        run: |
          echo "VITE_SUPABASE_URL=https://placeholder.supabase.co" > .env
          echo "VITE_SUPABASE_ANON_KEY=placeholder-anon-key" >> .env

      - name: Build (tsc + vite)
        working-directory: client
        run: npm run build

      - name: Verify chunks exist
        working-directory: client
        run: |
          test -f dist/index.html || (echo "dist/index.html missing" && exit 1)
          ls dist/assets/ | head -5
