name: E2E — Yönetim Ekibi

# Sprint: yonetim-ekibi (2026-05-30).
#
# yonetim-ekibi.spec.ts (huzur hakki / yonetim ekibi cari akisi) UI smoke'unu
# end-to-end dogrular:
#   - proje detayindan "Yönetim Ekibi" ikonu ile sayfaya erisim
#   - yonetim carisi ekle → tabloda borc/alacak/bakiye gorunur
#   - Odeme ekraninda "Yönetim" cari turu islem turu + odeme aracini kisitlar
#
# Spec icindeki test'ler seed/veri yoksa graceful gecer (smoke stil).
# Bu job, login-tabanli diger e2e workflow'lariyla ayni secret setine baglidir:
#   - E2E_USER, E2E_PASSWORD
#   - VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (renderer bundle)
#   - SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY (server)
#
# Trigger: manuel (workflow_dispatch) + yonetim-ekibi'ne dokunan dosya push'unda.
# 90sn webserver + login flow yavas; her PR'da kosulmaz.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'client/e2e/yonetim-ekibi.spec.ts'
      - 'client/e2e/helpers.ts'
      - 'client/src/pages/yonetim/**'
      - 'client/src/pages/cariHesap/OdemeKayit.tsx'
      - 'client/src/pages/projeler/ProjeDetailPage.tsx'
      - 'server/src/services/yonetimEkibi.service.ts'
      - 'server/src/controllers/yonetimEkibi.controller.ts'
      - 'server/src/routes/yonetimEkibi.routes.ts'
      - 'server/src/services/hakedis.service.ts'

concurrency:
  group: e2e-yonetim-ekibi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yonetim-ekibi:
    name: Playwright — yonetim-ekibi.spec.ts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip if E2E creds not configured
        id: precheck
        env:
          E2E_USER: ${{ secrets.E2E_USER }}
        run: |
          if [ -z "$E2E_USER" ]; then
            echo "E2E_USER secret bos — job skip ediliyor (yumusak gecis)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.precheck.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root deps (concurrently)
        if: steps.precheck.outputs.skip == 'false'
        run: npm ci

      - name: Install server deps
        if: steps.precheck.outputs.skip == 'false'
        working-directory: server
        run: npm ci

      - name: Install client deps
        if: steps.precheck.outputs.skip == 'false'
        working-directory: client
        run: npm ci

      - name: Create root .env (gercek Supabase creds)
        if: steps.precheck.outputs.skip == 'false'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          {
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
            echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY"
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
            echo "NODE_ENV=development"
          } > .env

      - name: Install Playwright browsers (chromium only)
        if: steps.precheck.outputs.skip == 'false'
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run yonetim-ekibi spec
        if: steps.precheck.outputs.skip == 'false'
        working-directory: client
        env:
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CI: 'true'
        run: npx playwright test yonetim-ekibi.spec.ts

      - name: Upload Playwright artifacts on failure
        if: failure() && steps.precheck.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-yonetim-ekibi-report
          path: |
            client/playwright-report/
            client/test-results/
          retention-days: 7
